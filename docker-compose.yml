
services:
  database:
    container_name: neural-book-rec-db
    image: pgvector/pgvector:pg18
    ports:
      - '5432:5432'
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/18/data

volumes:
  pg-data:
